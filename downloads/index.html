<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stock Inventory Manager — Download</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh; color: #e2e8f0; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .card {
      background: #fff; color: #111827; border-radius: 16px; max-width: 520px; width: 100%;
      box-shadow: 0 24px 48px rgba(0,0,0,.35); overflow: hidden;
    }
    .header { background: #1A2B4A; color: #fff; padding: 32px 28px; }
    .header h1 { font-size: 22px; margin-bottom: 6px; }
    .header p { opacity: .75; font-size: 14px; }
    .body { padding: 28px; }
    .btn {
      display: flex; align-items: center; gap: 12px; width: 100%; padding: 16px 18px;
      border: 1px solid #e5e7eb; border-radius: 10px; background: #f9fafb; color: #111827;
      text-decoration: none; font-weight: 600; font-size: 15px; margin-bottom: 12px; transition: .15s;
    }
    .btn:hover { background: #eff6ff; border-color: #93c5fd; }
    .btn span.sub { display: block; font-weight: 400; font-size: 12px; color: #6b7280; margin-top: 2px; }
    .note { font-size: 12px; color: #6b7280; margin-top: 16px; line-height: 1.5; }
    .loading { color: #6b7280; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>Stock Inventory Manager</h1>
      <p>Printing plates inventory, sales, purchases &amp; reminders</p>
    </div>
    <div class="body">
      <div id="links" class="loading">Loading latest downloads…</div>
      <p class="note">
        Install the app, then sign in with the tenant account your administrator provided.
        macOS: if blocked, right-click the app → Open. Windows: run the installer as usual.
      </p>
    </div>
  </div>
  <script>
    // Point this to your S3 manifest URL after CI runs, e.g.:
    // https://stock-inventory-assets.s3.us-east-1.amazonaws.com/releases/downloads.json
    const MANIFEST_URL = './downloads.json';

    fetch(MANIFEST_URL)
      .then(r => r.json())
      .then(data => {
        const el = document.getElementById('links');
        const items = [
          data.mac && { label: 'Download for macOS', sub: data.mac.name || 'Apple Silicon (.zip)', url: data.mac.url },
          data.windows && { label: 'Download for Windows', sub: data.windows.name || 'Installer (.exe)', url: data.windows.url },
        ].filter(Boolean);

        if (!items.length) {
          el.innerHTML = '<p class="loading">No downloads published yet. Check back after the next release build.</p>';
          return;
        }

        el.innerHTML = items.map(i => `
          <a class="btn" href="${i.url}" download>
            <div>
              ${i.label}
              <span class="sub">${i.sub} · v${data.version || '1.0.0'}</span>
            </div>
          </a>
        `).join('');
      })
      .catch(() => {
        document.getElementById('links').innerHTML =
          '<p class="loading">Could not load downloads.json. Upload it to S3 alongside this page.</p>';
      });
  </script>
</body>
</html>
